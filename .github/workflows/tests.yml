name: Tests

# Runs the pytest unit suite on every PR and on pushes to main.
# See pytest.ini for collection + Project/tests/unit/ for the actual tests.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system PyQt5 (mirrors --system-site-packages on the Pi)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends python3-pyqt5

      - name: Install pinned Python deps + dev deps
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt
          python3 -m pip install -r requirements-dev.txt

      - name: Run pytest
        run: python3 -m pytest
