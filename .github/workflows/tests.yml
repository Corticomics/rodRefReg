name: Tests

# Runs the pytest unit suite on every PR and on pushes to main.
# See pytest.ini for collection + Project/tests/unit/ for the actual tests.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install apt-provided Python deps (mirrors --system-site-packages on the Pi)
        run: |
          # Same packages the Pi installer pulls via apt and exposes through
          # --system-site-packages. Keeping CI on apt (not pip) matches the
          # device install path, so "works in CI, broken on Pi" can't happen
          # via a pandas/numpy/PyQt5 ABI skew. python3-numpy is a transitive
          # dep of python3-pandas, so apt resolves it automatically.
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends python3-pyqt5 python3-pandas

      - name: Install pinned Python deps + dev deps
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt
          python3 -m pip install -r requirements-dev.txt

      - name: Lint (ruff) — format + import-sort
        run: |
          # Enforce only the rules cleaned so far. ruff.toml's `select`
          # lists the full target set (F401/F811/F841/I); CI gates it
          # incrementally as each family is fixed in its own PR:
          #   now: formatting + import-sort (I) + unused-imports (F401)
          #   next: F841 unused-vars, then F811 redefinitions.
          ruff format --check .
          ruff check --select I,F401 .

      - name: Run pytest
        run: python3 -m pytest
