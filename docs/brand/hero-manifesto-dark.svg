<?xml version="1.0" encoding="UTF-8"?>
<!-- RRR brand — Hero direction F "Manifesto", dark variant, recoloured to the app teal palette. -->
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img"
     aria-label="A drop of water, on time, every time. 16-channel scheduled water delivery for laboratory rodents, built on a Raspberry Pi 5.">
  <defs>
    <linearGradient id="manBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F1419"/>
      <stop offset="100%" stop-color="#1A2028"/>
    </linearGradient>
    <pattern id="manGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#2D3748" stroke-width="0.5" opacity="0.5"/>
    </pattern>
  </defs>
  <rect width="1280" height="520" fill="url(#manBg)"/>
  <rect width="1280" height="520" fill="url(#manGrid)"/>

  <!-- huge type -->
  <g transform="translate(60,60)" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" fill="#F0F4F8">
    <text y="0" font-size="14" fill="#A0AEC0" letter-spacing="6">RODENT · REFRESHMENT · REGULATOR</text>
    <g font-weight="800" letter-spacing="-3" font-size="100">
      <text y="100">A drop of water,</text>
      <text y="200" fill="#14B8A6">on time,</text>
      <text y="300">every time.</text>
    </g>
    <text y="350" font-size="18" fill="#A0AEC0">16-channel scheduled water delivery for laboratory rodents,</text>
    <text y="376" font-size="18" fill="#A0AEC0">built on a Raspberry Pi 5.</text>
  </g>

  <!-- right column: stat tiles -->
  <g transform="translate(820,80)" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
    <!-- 16 · CHANNELS -->
    <g transform="translate(0,0)">
      <rect width="360" height="68" rx="10" fill="#1E2530" stroke="#2D3748"/>
      <rect width="6" height="68" rx="3" fill="#14B8A6"/>
      <text x="22" y="32" font-size="26" font-weight="800" fill="#14B8A6">16</text>
      <text x="22" y="50" font-family="'JetBrains Mono','SF Mono',ui-monospace,monospace" font-size="10" fill="#A0AEC0" letter-spacing="2">CHANNELS</text>
      <text x="22" y="62" font-size="11" fill="#F0F4F8">multiplexed I²C</text>
      <g transform="translate(240,34)">
        <polyline points="0,8 12,4 24,12 36,2 48,10 60,6 72,14 84,3 96,8" fill="none" stroke="#14B8A6" stroke-width="1.5" opacity="0.85"/>
      </g>
    </g>
    <!-- µL · PRECISION -->
    <g transform="translate(0,82)">
      <rect width="360" height="68" rx="10" fill="#1E2530" stroke="#2D3748"/>
      <rect width="6" height="68" rx="3" fill="#2DD4BF"/>
      <text x="22" y="32" font-size="26" font-weight="800" fill="#2DD4BF">µL</text>
      <text x="22" y="50" font-family="'JetBrains Mono','SF Mono',ui-monospace,monospace" font-size="10" fill="#A0AEC0" letter-spacing="2">PRECISION</text>
      <text x="22" y="62" font-size="11" fill="#F0F4F8">volumetric dosing</text>
      <g transform="translate(240,34)">
        <polyline points="0,8 12,4 24,12 36,2 48,10 60,6 72,14 84,3 96,8" fill="none" stroke="#2DD4BF" stroke-width="1.5" opacity="0.85"/>
      </g>
    </g>
    <!-- 24/7 · OPERATION -->
    <g transform="translate(0,164)">
      <rect width="360" height="68" rx="10" fill="#1E2530" stroke="#2D3748"/>
      <rect width="6" height="68" rx="3" fill="#5EEAD4"/>
      <text x="22" y="32" font-size="26" font-weight="800" fill="#5EEAD4">24/7</text>
      <text x="22" y="50" font-family="'JetBrains Mono','SF Mono',ui-monospace,monospace" font-size="10" fill="#A0AEC0" letter-spacing="2">OPERATION</text>
      <text x="22" y="62" font-size="11" fill="#F0F4F8">unattended service</text>
      <g transform="translate(240,34)">
        <polyline points="0,8 12,4 24,12 36,2 48,10 60,6 72,14 84,3 96,8" fill="none" stroke="#5EEAD4" stroke-width="1.5" opacity="0.85"/>
      </g>
    </g>
    <!-- SQLITE · AUDIT -->
    <g transform="translate(0,246)">
      <rect width="360" height="68" rx="10" fill="#1E2530" stroke="#2D3748"/>
      <rect width="6" height="68" rx="3" fill="#F0F4F8"/>
      <text x="22" y="32" font-size="26" font-weight="800" fill="#F0F4F8">SQLITE</text>
      <text x="22" y="50" font-family="'JetBrains Mono','SF Mono',ui-monospace,monospace" font-size="10" fill="#A0AEC0" letter-spacing="2">AUDIT</text>
      <text x="22" y="62" font-size="11" fill="#F0F4F8">every drop logged</text>
      <g transform="translate(240,34)">
        <polyline points="0,8 12,4 24,12 36,2 48,10 60,6 72,14 84,3 96,8" fill="none" stroke="#F0F4F8" stroke-width="1.5" opacity="0.85"/>
      </g>
    </g>
  </g>

  <!-- drip mark in lower-right of the big-type area -->
  <g transform="translate(640,420)">
    <path d="M 0 -22 C 12 -6 16 4 16 10 A 16 16 0 1 1 -16 10 C -16 4 -12 -6 0 -22 Z" fill="#14B8A6"/>
  </g>
</svg>
